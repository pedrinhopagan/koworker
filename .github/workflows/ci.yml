name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, Lint, Format & Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      JWT_SECRET: ci-not-a-real-secret
      DATABASE_URL: /tmp/koworker-ci.sqlite
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsgo --noEmit

      - name: Lint
        run: bun run oxlint

      - name: Format check
        run: bunx oxfmt --check src scripts

      - name: Tests
        run: bun test
